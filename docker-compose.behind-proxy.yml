# Variant for a VPS that ALREADY runs a web server (nginx/apache) on 80/443.
# No Caddy here: frontend and backend are published only on localhost, and your
# existing host proxy terminates TLS and forwards to them.
#
#   docker compose -f docker-compose.behind-proxy.yml up -d --build
#
# Uses the same .env as docker-compose.prod.yml (DOMAIN, secrets, etc).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: https://${DOMAIN}
      UPLOAD_DIR: /data/uploads
      UPLOAD_PUBLIC_BASE_URL: https://${DOMAIN}/uploads
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-TheDiamond <onboarding@resend.dev>}
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: https://${DOMAIN}
      BACKEND_INTERNAL_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
  uploads:
