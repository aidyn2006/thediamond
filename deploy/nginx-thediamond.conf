# Host nginx vhost for TheDiamond, sitting in front of the containers started by
# docker-compose.nginx.yml (frontend on 127.0.0.1:3002, backend on 127.0.0.1:8082).
#
# 1) put this in /etc/nginx/sites-available/thediamond.conf and symlink into sites-enabled
# 2) issue TLS: certbot --nginx -d thediamond.kz -d www.thediamond.kz
# 3) nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name thediamond.kz www.thediamond.kz;

    client_max_body_size 5m;               # avatar uploads (2 MB) + headroom

    # avatar files are served by the backend
    location /uploads/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # everything else (site + Auth.js API) -> Next.js
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
