# IP-only, NO HTTPS. Public entry on host port ${HOST_PORT} (default 8090),
# so it doesn't clash with an existing web server on 80/443.
#
#   docker compose -f docker-compose.ip.yml up -d --build
#
# Requires in .env:
#   PUBLIC_ORIGIN=http://<VPS_IP>:8090     (exact origin you open in the browser)
#   HOST_PORT=8090                         (optional, defaults to 8090)
# plus POSTGRES_*, JWT_SECRET, AUTH_SECRET.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${PUBLIC_ORIGIN}
      UPLOAD_DIR: /data/uploads
      UPLOAD_PUBLIC_BASE_URL: ${PUBLIC_ORIGIN}/uploads
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-TheDiamond <onboarding@resend.dev>}
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: ${PUBLIC_ORIGIN}
      BACKEND_INTERNAL_URL: http://backend:8080
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8090}:80"
    volumes:
      - ./Caddyfile.http:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  uploads:
