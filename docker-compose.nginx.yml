# Production stack for a VPS where host nginx terminates HTTP/TLS.
#
# Public traffic:
#   nginx :80/:443 -> 127.0.0.1:${FRONTEND_HOST_PORT:-3002}
#   /uploads/*     -> 127.0.0.1:${BACKEND_HOST_PORT:-8082}
#
# Usage:
#   DOMAIN=thediamond.kz docker compose -f docker-compose.nginx.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8082}:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: https://${DOMAIN},http://${DOMAIN}
      UPLOAD_DIR: /data/uploads
      UPLOAD_PUBLIC_BASE_URL: https://${DOMAIN}/uploads
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-TheDiamond <onboarding@resend.dev>}
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-3002}:3000"
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      AUTH_URL: https://${DOMAIN}
      BACKEND_INTERNAL_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
