spring:
  application:
    name: thediamond-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/thediamond}
    username: ${DATABASE_USER:thediamond}
    password: ${DATABASE_PASSWORD:thediamond}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB
  # SMTP transport (e.g. Mail.ru). When host+username are set, EmailService sends
  # via SMTP; otherwise it falls back to Resend, then to console logging.
  mail:
    host: ${MAIL_SMTP_HOST:}
    port: ${MAIL_SMTP_PORT:465}
    username: ${MAIL_SMTP_USERNAME:}
    password: ${MAIL_SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: ${MAIL_SMTP_SSL:true}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}
      mail.smtp.connectiontimeout: 10000
      mail.smtp.timeout: 10000
      mail.smtp.writetimeout: 10000

server:
  port: ${BACKEND_PORT:8080}

app:
  jwt:
    # Dev-only default. In production MUST be provided via env (>= 32 chars for HS256).
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32bytes-min!!}
    # token lifetime in minutes
    ttl-minutes: ${JWT_TTL_MINUTES:720}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  storage:
    # local filesystem dir for uploaded avatars (abstracted behind StorageService)
    upload-dir: ${UPLOAD_DIR:./uploads}
    public-base-url: ${UPLOAD_PUBLIC_BASE_URL:http://localhost:8080/uploads}
  # Public site URL, used to build links in emails (e.g. password reset).
  site-url: ${SITE_URL:http://localhost:3000}
  mail:
    # Resend fallback (used only when SMTP above is not configured).
    # Without SMTP and without an API key, emails are logged to the console.
    resend-api-key: ${RESEND_API_KEY:}
    from: ${MAIL_FROM:TheDiamond <onboarding@resend.dev>}

logging:
  level:
    org.flywaydb: info
