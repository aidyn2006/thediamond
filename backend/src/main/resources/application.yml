spring:
  application:
    name: thediamond-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/thediamond}
    username: ${DATABASE_USER:thediamond}
    password: ${DATABASE_PASSWORD:thediamond}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB

server:
  port: ${BACKEND_PORT:8080}

app:
  jwt:
    # Dev-only default. In production MUST be provided via env (>= 32 chars for HS256).
    secret: ${JWT_SECRET:dev-only-secret-change-me-please-32bytes-min!!}
    # token lifetime in minutes
    ttl-minutes: ${JWT_TTL_MINUTES:720}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  storage:
    # local filesystem dir for uploaded avatars (abstracted behind StorageService)
    upload-dir: ${UPLOAD_DIR:./uploads}
    public-base-url: ${UPLOAD_PUBLIC_BASE_URL:http://localhost:8080/uploads}

logging:
  level:
    org.flywaydb: info
